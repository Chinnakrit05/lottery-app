appId: com.chinnakrit.lotteryapp
productName: LotteryApp
copyright: Copyright © 2026 chinnakrit.mek@gmail.com

# Auto-update target — GitHub Releases
# Update owner + repo to match your GitHub repository
publish:
  - provider: github
    owner: Chinnakrit05
    repo: lottery-app
    releaseType: release

directories:
  output: dist
  buildResources: build

files:
  - out/**/*
  - dist-electron/**/*
  - package.json
  - "!node_modules/**/*.{md,ts,map,h,c,cc,cpp}"

asar: true
asarUnpack:
  - "**/*.node"

# Windows
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: build/icon.ico
  artifactName: ${productName}-${version}-${arch}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: LotteryApp

portable:
  artifactName: LotteryApp-${version}-portable.exe

# macOS
mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: build/icon.icns
  category: public.app-category.finance
  hardenedRuntime: true
  gatekeeperAssess: false
  artifactName: ${productName}-${version}-${arch}.${ext}

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# Linux (optional)
linux:
  target:
    - AppImage
    - deb
  icon: build/icon.png
  category: Office
